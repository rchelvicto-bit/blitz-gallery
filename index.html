<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blitz Gallery</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#fff4f7;color:#7a2942}
    .wrap{max-width:1100px;margin:auto;padding:26px 16px 60px}
    .hero{text-align:center;background:white;border-radius:30px;padding:28px 18px;margin-bottom:22px;box-shadow:0 16px 40px rgba(242,91,147,.16)}
    .logo{font-size:48px;font-weight:900;color:#f25b93}
    .sub{font-weight:800;margin-top:8px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
    .card{background:white;border-radius:26px;padding:16px;box-shadow:0 12px 32px rgba(242,91,147,.14)}
    .card h2{text-align:center;margin:4px 0 14px;color:#b94c6b}
    img,video{width:100%;max-height:620px;object-fit:contain;border-radius:18px;background:#fff9fb}
    a.btn{display:block;margin-top:14px;background:#f25b93;color:white;text-align:center;padding:14px;border-radius:16px;text-decoration:none;font-weight:900}
    .loading,.empty{text-align:center;background:white;border-radius:24px;padding:28px;font-weight:800}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="logo">BLITZ</div>
      <div class="sub">Your soft files are ready ✨</div>
    </div>

    <div id="content" class="loading">Loading gallery...</div>
  </div>

<script>
const SUPABASE_URL = "https://goagctycysswfhzedbwf.supabase.co";
const BUCKET = "blitz-galleries";

const params = new URLSearchParams(window.location.search);
const galleryId = params.get("id") || params.get("galleryId");

const content = document.getElementById("content");

function fileUrl(path) {
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/galleries/${galleryId}/${path}`;
}

async function exists(path) {
  try {
    const res = await fetch(fileUrl(path), { method: "HEAD" });
    return res.ok;
  } catch {
    return false;
  }
}

function imageCard(title, path) {
  const url = fileUrl(path);
  return `
    <section class="card">
      <h2>${title}</h2>
      <img src="${url}" alt="${title}">
      <a class="btn" href="${url}" download>Download</a>
    </section>`;
}

function videoCard(title, path) {
  const url = fileUrl(path);
  return `
    <section class="card">
      <h2>${title}</h2>
      <video controls playsinline preload="metadata">
        <source src="${url}" type="video/mp4">
      </video>
      <a class="btn" href="${url}" download>Download</a>
    </section>`;
}

async function loadGallery() {
  if (!galleryId) {
    content.className = "empty";
    content.innerHTML = "Gallery ID tidak ditemukan.";
    return;
  }

  let html = "";

  if (await exists("Photostrip.png"))
    html += imageCard("Photostrip", "Photostrip.png");

  if (await exists("LivePhoto.mp4"))
    html += videoCard("Live Photo", "LivePhoto.mp4");

  for (let i = 1; i <= 20; i++) {
    const path = `Animation_${i}.mp4`;
    if (await exists(path))
      html += videoCard(`Animation ${i}`, path);
  }

  for (let i = 1; i <= 20; i++) {
    const path = `Boomerang_${i}.mp4`;
    if (await exists(path))
      html += videoCard(`Boomerang ${i}`, path);
  }

  for (let i = 1; i <= 20; i++) {
    const path = `SinglePhotos/SinglePhoto_${i}.jpg`;
    if (await exists(path))
      html += imageCard(`Single Photo ${i}`, path);
  }

  if (!html) {
    content.className = "empty";
    content.innerHTML = "File gallery belum tersedia.";
    return;
  }

  content.className = "grid";
  content.innerHTML = html;
}

loadGallery();
</script>
</body>
</html>
